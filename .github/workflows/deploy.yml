name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Add Hugging Face remote with token
          # Note: Replace 'tramdk/event-bus-svc' if your Space name is different
          git remote add hf https://tramdk:$HF_TOKEN@huggingface.co/spaces/tramdk/event-bus-svc
          
          # Force push to Hugging Face to ensure sync
          git push --force hf main
